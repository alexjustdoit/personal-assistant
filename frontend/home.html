<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="dark min-h-screen bg-gray-950 text-gray-100">

  <div class="max-w-2xl mx-auto px-6 py-12">

    <!-- Header -->
    <div class="flex items-start justify-between mb-10">
      <div>
        <h1 class="text-3xl font-semibold text-gray-100" id="greeting">Good morning</h1>
        <p class="text-gray-500 text-sm mt-1" id="date-line"></p>
      </div>
      <a href="/chat" id="new-chat-link" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl text-sm font-medium transition-colors flex-shrink-0 mt-1">
        New chat →
      </a>
    </div>

    <!-- Briefing card -->
    <div class="mb-10">
      <h2 class="text-xs font-semibold text-gray-600 uppercase tracking-wider mb-3" id="briefing-label">Briefing</h2>

      <!-- Loading state -->
      <div id="briefing-loading" class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
        <div class="flex items-center gap-3 text-gray-500 text-sm">
          <div class="loading-dots"><span></span><span></span><span></span></div>
          <span>Generating your briefing…</span>
        </div>
      </div>

      <!-- Content -->
      <div id="briefing-section" class="hidden bg-gray-900 border border-gray-800 rounded-2xl p-6">
        <p id="briefing-text" class="text-gray-200 text-sm leading-relaxed"></p>
        <p id="briefing-time" class="text-gray-600 text-xs mt-4"></p>
      </div>

      <!-- Error state -->
      <div id="briefing-error" class="hidden bg-gray-900/50 border border-gray-800/50 border-dashed rounded-2xl p-6 text-center">
        <p class="text-gray-600 text-sm">Couldn't generate a briefing — check that Ollama is running.</p>
      </div>
    </div>

    <!-- Recent chats -->
    <div>
      <h2 class="text-xs font-semibold text-gray-600 uppercase tracking-wider mb-3">Recent Chats</h2>
      <div id="chat-list" class="space-y-2"></div>
      <div id="no-chats" class="hidden text-center py-10">
        <p class="text-gray-600 text-sm mb-3">No conversations yet.</p>
        <a href="/chat" class="text-indigo-400 hover:text-indigo-300 text-sm font-medium transition-colors">Start your first conversation →</a>
      </div>
      <div id="chats-loading" class="space-y-2">
        <div class="h-14 bg-gray-900 border border-gray-800 rounded-xl animate-pulse"></div>
        <div class="h-14 bg-gray-900 border border-gray-800 rounded-xl animate-pulse opacity-60"></div>
        <div class="h-14 bg-gray-900 border border-gray-800 rounded-xl animate-pulse opacity-30"></div>
      </div>
    </div>

  </div>

  <script src="/static/js/home.js"></script>
</body>
</html>
