<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Assistant</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="dark min-h-screen bg-gray-950 text-gray-100">

  <div class="max-w-3xl mx-auto px-6 py-12">

    <!-- Header -->
    <div class="flex items-start justify-between mb-10">
      <div>
        <h1 class="text-3xl font-semibold text-gray-100" id="greeting">Good morning</h1>
        <p class="text-gray-500 text-sm mt-1" id="date-line"></p>
      </div>
      <a href="/chat" id="new-chat-link" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl text-sm font-medium transition-colors flex-shrink-0 mt-1">
        New chat →
      </a>
    </div>

    <!-- Briefing section -->
    <div class="mb-10">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xs font-semibold text-gray-600 uppercase tracking-wider" id="briefing-label">Briefing</h2>
        <button id="briefing-refresh" title="Regenerate briefing" class="text-gray-600 hover:text-gray-400 transition-colors p-1 rounded-lg hover:bg-gray-800">
          <svg id="refresh-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
        </button>
      </div>

      <!-- Loading state -->
      <div id="briefing-loading">
        <div class="grid grid-cols-2 gap-3 mb-3">
          <div class="h-28 bg-gray-900 border border-gray-800 rounded-2xl animate-pulse"></div>
          <div class="h-28 bg-gray-900 border border-gray-800 rounded-2xl animate-pulse opacity-70"></div>
        </div>
        <div class="h-20 bg-gray-900 border border-gray-800 rounded-2xl animate-pulse opacity-50"></div>
      </div>

      <!-- Tiles (populated by JS) -->
      <div id="briefing-tiles" class="hidden space-y-3"></div>

      <!-- Error -->
      <div id="briefing-error" class="hidden bg-gray-900/50 border border-gray-800/50 border-dashed rounded-2xl p-6 text-center">
        <p class="text-gray-600 text-sm">Couldn't load briefing — check that your AI provider and services are configured correctly.</p>
      </div>
    </div>

    <!-- Recent chats -->
    <div>
      <h2 class="text-xs font-semibold text-gray-600 uppercase tracking-wider mb-3">Recent Chats</h2>
      <div id="chat-list" class="space-y-2"></div>
      <div id="no-chats" class="hidden text-center py-10">
        <p class="text-gray-600 text-sm mb-3">No conversations yet.</p>
        <a href="/chat" class="text-indigo-400 hover:text-indigo-300 text-sm font-medium transition-colors">Start your first conversation →</a>
      </div>
      <div id="chats-loading" class="space-y-2">
        <div class="h-14 bg-gray-900 border border-gray-800 rounded-xl animate-pulse"></div>
        <div class="h-14 bg-gray-900 border border-gray-800 rounded-xl animate-pulse opacity-60"></div>
        <div class="h-14 bg-gray-900 border border-gray-800 rounded-xl animate-pulse opacity-30"></div>
      </div>
    </div>

  </div>

  <script src="/static/js/home.js"></script>
</body>
</html>
