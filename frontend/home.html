<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Assistant</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="dark h-full bg-gray-950 text-gray-100 flex overflow-hidden">

  <!-- Sidebar backdrop (mobile) -->
  <div id="sidebar-backdrop" class="fixed inset-0 bg-black/60 z-20 hidden"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar sidebar-visible bg-gray-900 border-r border-gray-800 flex flex-col z-30 flex-shrink-0">
    <div class="flex items-center justify-between px-4 py-4 border-b border-gray-800 flex-shrink-0">
      <div class="flex items-center gap-1.5 text-gray-200 text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Home
      </div>
      <button id="new-chat-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg px-3 py-1.5 text-xs font-medium transition-colors">
        + New Chat
      </button>
    </div>
    <div id="chat-list" class="flex-1 overflow-y-auto py-2">
      <p class="text-gray-600 text-xs px-4 py-3">Loading chats…</p>
    </div>
  </aside>

  <!-- Main column -->
  <div class="flex flex-col flex-1 min-w-0 h-full">

    <!-- Header -->
    <header class="flex items-center justify-between px-4 py-3 border-b border-gray-800 flex-shrink-0">
      <div class="flex items-center gap-3 min-w-0">
        <button id="sidebar-toggle" title="Toggle sidebar" class="text-gray-400 hover:text-gray-200 hover:bg-gray-800 p-1.5 rounded-lg transition-colors flex-shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <span class="font-medium text-gray-200 text-sm truncate" id="greeting">Good morning</span>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <p class="text-gray-600 text-xs hidden sm:block" id="date-line"></p>
        <select id="provider-select" class="bg-gray-800 text-gray-300 text-sm rounded-lg px-3 py-1.5 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
          <option value="">Loading…</option>
        </select>
      </div>
    </header>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto px-4 py-6">
      <div class="max-w-2xl mx-auto">

        <!-- Briefing section -->
        <div>
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-xs font-semibold text-gray-600 uppercase tracking-wider" id="briefing-label">Briefing</h2>
            <button id="briefing-refresh" title="Regenerate briefing" class="text-gray-600 hover:text-gray-400 transition-colors p-1 rounded-lg hover:bg-gray-800">
              <svg id="refresh-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
              </svg>
            </button>
          </div>

          <!-- Loading state -->
          <div id="briefing-loading">
            <div class="grid grid-cols-2 gap-3 mb-3">
              <div class="h-28 bg-gray-900 border border-gray-800 rounded-2xl animate-pulse"></div>
              <div class="h-28 bg-gray-900 border border-gray-800 rounded-2xl animate-pulse opacity-70"></div>
            </div>
            <div class="h-20 bg-gray-900 border border-gray-800 rounded-2xl animate-pulse opacity-50"></div>
          </div>

          <!-- Tiles (populated by JS) -->
          <div id="briefing-tiles" class="hidden space-y-3"></div>

          <!-- Error -->
          <div id="briefing-error" class="hidden bg-gray-900/50 border border-gray-800/50 border-dashed rounded-2xl p-6 text-center">
            <p class="text-gray-600 text-sm">Couldn't load briefing — check that your AI provider and services are configured correctly.</p>
          </div>
        </div>

      </div>
    </main>

  </div>

  <script src="/static/js/home.js"></script>
</body>
</html>
