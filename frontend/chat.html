<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — Home Assistant</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="dark h-full bg-gray-950 text-gray-100 flex overflow-hidden">

  <!-- Sidebar backdrop (mobile) -->
  <div id="sidebar-backdrop" class="fixed inset-0 bg-black/60 z-20 hidden"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar sidebar-visible bg-gray-900 border-r border-gray-800 flex flex-col z-30 flex-shrink-0">
    <div class="flex items-center justify-between px-4 py-4 border-b border-gray-800 flex-shrink-0">
      <a href="/" class="flex items-center gap-1.5 text-gray-500 hover:text-gray-300 transition-colors text-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Home
      </a>
      <button id="new-chat-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg px-3 py-1.5 text-xs font-medium transition-colors">
        + New Chat
      </button>
    </div>
    <div id="chat-list" class="flex-1 overflow-y-auto py-2">
      <p class="text-gray-600 text-xs px-4 py-3">Loading chats…</p>
    </div>
  </aside>

  <!-- Main column -->
  <div class="flex flex-col flex-1 min-w-0 h-full">

    <!-- Header -->
    <header class="flex items-center justify-between px-4 py-3 border-b border-gray-800 flex-shrink-0">
      <div class="flex items-center gap-3 min-w-0">
        <button id="sidebar-toggle" title="Toggle sidebar" class="text-gray-400 hover:text-gray-200 hover:bg-gray-800 p-1.5 rounded-lg transition-colors flex-shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <div class="w-2 h-2 rounded-full bg-green-500 flex-shrink-0" id="status-dot"></div>
        <span class="font-medium text-gray-200 text-sm truncate" id="chat-title">Home Assistant</span>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <button id="tts-toggle" title="Toggle voice responses" class="text-gray-500 hover:text-gray-300 hover:bg-gray-800 transition-colors p-1.5 rounded-lg text-base leading-none">🔇</button>
        <select id="provider-select" class="bg-gray-800 text-gray-300 text-sm rounded-lg px-3 py-1.5 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
          <option value="">Loading…</option>
        </select>
      </div>
    </header>

    <!-- Welcome screen -->
    <div id="welcome" class="flex-1 flex flex-col items-center justify-center px-6 text-center overflow-y-auto">
      <div class="mb-3 text-5xl">🏠</div>
      <h1 class="text-2xl font-semibold text-gray-100 mb-2">What can I help with?</h1>
      <p class="text-gray-500 text-sm max-w-sm mb-8">Ask me anything, set reminders, or just have a conversation. Everything runs locally.</p>
      <div class="grid grid-cols-2 gap-3 max-w-md w-full">
        <button class="suggestion-chip" data-prompt="What can you help me with?">What can you do?</button>
        <button class="suggestion-chip" data-prompt="Remind me to check my emails tonight at 7pm">Set a reminder</button>
        <button class="suggestion-chip" data-prompt="Tell me something interesting">Tell me something interesting</button>
        <button class="suggestion-chip" data-prompt="What's the weather like today?">What's the weather?</button>
      </div>
    </div>

    <!-- Messages -->
    <main class="flex-1 overflow-y-auto px-4 py-6 space-y-4 hidden" id="messages"></main>

    <!-- Input -->
    <footer class="px-4 py-4 border-t border-gray-800 flex-shrink-0">
      <div class="max-w-3xl mx-auto flex gap-3">
        <button id="mic-btn" title="Click to record" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-4 py-3 rounded-xl text-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed flex-shrink-0">🎤</button>
        <input id="input" type="text" placeholder="Ask me anything…" class="flex-1 bg-gray-800 text-gray-100 placeholder-gray-500 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 min-w-0" autocomplete="off" />
        <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-3 rounded-xl text-sm font-medium transition-colors disabled:opacity-40 disabled:cursor-not-allowed flex-shrink-0">Send</button>
      </div>
    </footer>

  </div>

  <script src="/static/js/chat.js"></script>
</body>
</html>
