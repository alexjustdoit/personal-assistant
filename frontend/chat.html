<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat — Personal Assistant</title>
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#030712">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Assistant">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="dark h-full bg-gray-950 text-gray-100 flex overflow-hidden">

  <!-- Sidebar backdrop (mobile) -->
  <div id="sidebar-backdrop" class="fixed inset-0 bg-black/60 z-20 hidden"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar sidebar-visible bg-gray-900 border-r border-gray-800 flex flex-col z-30 flex-shrink-0">
    <div class="flex items-center justify-between px-4 py-4 border-b border-gray-800 flex-shrink-0">
      <a href="/" id="home-link" class="relative flex items-center gap-1.5 text-gray-500 hover:text-gray-300 transition-colors text-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Home
        <span id="briefing-badge" class="hidden absolute -top-1 -right-1 w-2 h-2 bg-indigo-400 rounded-full animate-pulse"></span>
      </a>
      <button id="new-chat-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg px-3 py-1.5 text-xs font-medium transition-colors">
        + New Chat
      </button>
    </div>
    <div class="px-3 pt-2 pb-1 flex-shrink-0">
      <input id="chat-search" type="text" placeholder="Search chats…" autocomplete="off"
        class="w-full bg-gray-800 text-gray-300 text-xs rounded-lg px-3 py-1.5 placeholder-gray-600 focus:outline-none focus:ring-1 focus:ring-indigo-500 border border-gray-800" />
    </div>
    <div id="chat-list" class="flex-1 overflow-y-auto overflow-x-hidden py-1">
      <p class="text-gray-600 text-xs px-4 py-3">Loading chats…</p>
    </div>
  </aside>

  <!-- Main column -->
  <div class="flex flex-col flex-1 min-w-0 h-full">

    <!-- Header -->
    <header class="flex items-center justify-between px-4 py-3 border-b border-gray-800 flex-shrink-0">
      <div class="flex items-center gap-3 min-w-0">
        <button id="sidebar-toggle" title="Toggle sidebar" class="text-gray-400 hover:text-gray-200 hover:bg-gray-800 p-1.5 rounded-lg transition-colors flex-shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <div class="w-2 h-2 rounded-full bg-green-500 flex-shrink-0" id="status-dot"></div>
        <span class="font-medium text-gray-200 text-sm truncate" id="chat-title">Personal Assistant</span>
      </div>
      <div class="flex items-center gap-2 flex-shrink-0">
        <a href="/settings" title="Settings" class="text-gray-500 hover:text-gray-300 hover:bg-gray-800 transition-colors p-1.5 rounded-lg">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </a>
        <button id="export-btn" title="Export conversation" class="text-gray-500 hover:text-gray-300 hover:bg-gray-800 transition-colors p-1.5 rounded-lg">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        </button>
        <button id="tts-toggle" title="Toggle voice responses" class="text-gray-500 hover:text-gray-300 hover:bg-gray-800 transition-colors p-1.5 rounded-lg text-base leading-none">🔇</button>
        <select id="provider-select" class="bg-gray-800 text-gray-300 text-sm rounded-lg px-3 py-1.5 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
          <option value="">Loading…</option>
        </select>
      </div>
    </header>

    <!-- Welcome screen -->
    <div id="welcome" class="flex-1 flex flex-col items-center justify-center px-6 text-center overflow-y-auto">
      <div class="mb-3 text-5xl">🏠</div>
      <h1 class="text-2xl font-semibold text-gray-100 mb-2">What can I help with?</h1>
      <p class="text-gray-500 text-sm max-w-sm mb-8">Ask me anything, set reminders, or just have a conversation. Everything runs locally.</p>
      <div class="grid grid-cols-2 gap-3 max-w-md w-full">
        <button class="suggestion-chip" data-prompt="What can you help me with?">What can you do?</button>
        <button class="suggestion-chip" data-prompt="Remind me to check my emails tonight at 7pm">Set a reminder</button>
        <button class="suggestion-chip" data-prompt="Tell me something interesting">Tell me something interesting</button>
        <button class="suggestion-chip" data-prompt="What's the weather like today?">What's the weather?</button>
      </div>
    </div>

    <!-- Messages -->
    <main class="flex-1 overflow-y-auto px-4 py-6 space-y-4 hidden" id="messages"></main>

    <!-- Input -->
    <footer class="px-4 py-4 border-t border-gray-800 flex-shrink-0">
      <div class="max-w-3xl mx-auto">
        <!-- Image preview -->
        <div id="image-preview-area" class="hidden mb-2 flex items-center gap-3">
          <img id="image-preview" class="h-16 w-16 object-cover rounded-lg border border-gray-700 flex-shrink-0" alt="Attached image" />
          <button id="image-remove" class="text-xs text-gray-500 hover:text-gray-300 transition-colors">✕ Remove</button>
        </div>
        <!-- Document preview -->
        <div id="doc-preview-area" class="hidden mb-2 flex items-center gap-3 px-1">
          <svg class="w-4 h-4 text-indigo-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <span id="doc-preview-name" class="text-sm text-gray-300 truncate flex-1"></span>
          <button id="doc-remove" class="text-xs text-gray-500 hover:text-gray-300 transition-colors flex-shrink-0">✕</button>
        </div>
        <!-- Input row -->
        <div class="flex gap-3">
          <button id="mic-btn" title="Click to record" class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-3 py-3 rounded-xl text-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed flex-shrink-0">🎤</button>
          <input id="image-input" type="file" accept="image/*" class="hidden" />
          <input id="doc-input" type="file" accept=".pdf,.txt,.md,.csv" class="hidden" />
          <button id="image-btn" title="Attach image" class="bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-gray-200 px-3 py-3 rounded-xl transition-colors flex-shrink-0">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
          </button>
          <button id="doc-btn" title="Attach document (PDF, txt, md)" class="bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-gray-200 px-3 py-3 rounded-xl transition-colors flex-shrink-0">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </button>
          <input id="input" type="text" placeholder="Ask me anything…" class="flex-1 bg-gray-800 text-gray-100 placeholder-gray-500 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 min-w-0" autocomplete="off" />
          <button id="stop-btn" class="hidden bg-gray-700 hover:bg-gray-600 text-gray-200 px-5 py-3 rounded-xl text-sm font-medium transition-colors flex-shrink-0">Stop</button>
          <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-3 rounded-xl text-sm font-medium transition-colors disabled:opacity-40 disabled:cursor-not-allowed flex-shrink-0">Send</button>
        </div>
      </div>
    </footer>

  </div>

  <script src="/static/js/chat.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
