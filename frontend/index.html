<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="dark h-full bg-gray-950 text-gray-100 flex flex-col">

  <!-- Header -->
  <header class="flex items-center justify-between px-6 py-4 border-b border-gray-800">
    <div class="flex items-center gap-3">
      <div class="w-2 h-2 rounded-full bg-green-500" id="status-dot"></div>
      <span class="font-semibold text-gray-100 tracking-wide">Home Assistant</span>
    </div>
    <div class="flex items-center gap-3">
      <button
        id="tts-toggle"
        title="Toggle voice responses"
        class="text-gray-500 hover:text-gray-300 transition-colors text-lg leading-none"
      >🔇</button>
      <select
        id="provider-select"
        class="bg-gray-800 text-gray-300 text-sm rounded-lg px-3 py-1.5 border border-gray-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer"
      >
        <option value="">Loading...</option>
      </select>
    </div>
  </header>

  <!-- Welcome screen (shown when no messages) -->
  <div id="welcome" class="flex-1 flex flex-col items-center justify-center px-4 text-center">
    <div class="mb-2 text-4xl">🏠</div>
    <h1 class="text-2xl font-semibold text-gray-100 mb-2">Welcome to your Home Assistant</h1>
    <p class="text-gray-400 text-sm max-w-md mb-8">Ask me anything, set reminders, or just have a conversation. I run locally on your machine — your data stays yours.</p>
    <div class="grid grid-cols-2 gap-3 max-w-lg w-full">
      <button class="suggestion-chip" data-prompt="What can you help me with?">What can you help me with?</button>
      <button class="suggestion-chip" data-prompt="Remind me to check my emails tonight at 7pm">Set a reminder for me</button>
      <button class="suggestion-chip" data-prompt="Tell me something interesting">Tell me something interesting</button>
      <button class="suggestion-chip" data-prompt="What's the weather like today?">What's the weather like?</button>
    </div>
  </div>

  <!-- Messages -->
  <main class="flex-1 overflow-y-auto px-4 py-6 space-y-4 hidden" id="messages"></main>

  <!-- Input -->
  <footer class="px-4 py-4 border-t border-gray-800">
    <div class="max-w-3xl mx-auto flex gap-3">
      <button
        id="mic-btn"
        title="Hold to record"
        class="bg-gray-800 hover:bg-gray-700 text-gray-300 px-4 py-3 rounded-xl text-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
      >🎤</button>
      <input
        id="input"
        type="text"
        placeholder="Ask me anything..."
        class="flex-1 bg-gray-800 text-gray-100 placeholder-gray-500 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        autocomplete="off"
      />
      <button
        id="send-btn"
        class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-3 rounded-xl text-sm font-medium transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
      >
        Send
      </button>
    </div>
  </footer>

  <script src="/static/js/app.js"></script>
</body>
</html>
