<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memories — Personal Assistant</title>
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="dark min-h-screen bg-gray-950 text-gray-100">

  <div class="max-w-2xl mx-auto px-4 py-8">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-3">
        <a href="/" class="text-gray-500 hover:text-gray-300 transition-colors p-1.5 rounded-lg hover:bg-gray-800">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
        </a>
        <h1 class="text-lg font-semibold text-gray-100">Personal Memory</h1>
      </div>
      <span id="memory-count" class="text-xs text-gray-600"></span>
    </div>

    <p class="text-gray-500 text-sm mb-4 leading-relaxed">These are facts the assistant has learned about you from your conversations. Delete any that are wrong or outdated.</p>

    <input id="memory-search" type="text" placeholder="Filter memories…" autocomplete="off"
      class="w-full bg-gray-900 border border-gray-800 text-gray-300 text-sm rounded-xl px-4 py-2.5 mb-5 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500" />

    <!-- Loading -->
    <div id="memories-loading" class="space-y-2">
      <div class="h-12 bg-gray-900 border border-gray-800 rounded-xl animate-pulse"></div>
      <div class="h-12 bg-gray-900 border border-gray-800 rounded-xl animate-pulse opacity-70"></div>
      <div class="h-12 bg-gray-900 border border-gray-800 rounded-xl animate-pulse opacity-50"></div>
    </div>

    <!-- Empty state -->
    <div id="memories-empty" class="hidden text-center py-12">
      <div class="text-4xl mb-3">🧠</div>
      <p class="text-gray-400 text-sm">No memories yet.</p>
      <p class="text-gray-600 text-xs mt-1">Tell the assistant something about yourself and it will remember it here.</p>
    </div>

    <!-- Memory list -->
    <div id="memories-list" class="hidden space-y-2"></div>

  </div>

  <script src="/static/js/memories.js"></script>
</body>
</html>
